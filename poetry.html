<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famous Hindi Poetry Archive 📜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;800&family=Lora:ital,wght@1,500&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-100 py-6 px-4" style="font-family: 'Baloo 2', sans-serif;">

    <div class="max-w-4xl mx-auto">
        <nav class="flex flex-wrap items-center justify-between bg-slate-950 p-4 rounded-2xl border-2 border-orange-500 mb-8 shadow-lg">
            <a href="seedhe_sawal_tedhe_javab.html" class="text-yellow-400 font-black text-xl tracking-wide uppercase">🤪 Desi Fun Zone</a>
            <div class="flex gap-2">
                <a href="seedhe_sawal_tedhe_javab.html" class="bg-slate-800 text-slate-300 font-bold px-3 py-1.5 rounded-xl text-sm transition">Sawal-Javab</a>
                <a href="jokes.html" class="bg-slate-800 text-slate-300 font-bold px-3 py-1.5 rounded-xl text-sm transition">Chutkule</a>
                <a href="shayari.html" class="bg-slate-800 text-slate-300 font-bold px-3 py-1.5 rounded-xl text-sm transition">Shayari</a>
                <a href="poetry.html" class="bg-orange-500 text-white font-bold px-3 py-1.5 rounded-xl text-sm">Kavita</a>
            </div>
        </nav>

        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-stone-800 uppercase">महान हिंदी कविता संग्रह (125 Poems) 📜</h1>
            <p class="text-stone-600 mt-2">दिनकर, हरिवंश राय बच्चन और निराला के अमर शब्दों का महासागर</p>
        </header>

        <div id="poetryWall" class="space-y-8"></div>
    </div>

    <script>
        const poetryDataset = [];
        const classicMasterpieces = [
            {
                title: "मधुशाला (Madhushala Extracts)",
                author: "हरिवंश राय बच्चन",
                lines: "मृदु भावों के अंगूरों की आज बना लाया हाला,<br>प्रियतम, अपने ही हाथों से आज पिलाऊँगा प्याला,<br>पहले भोग लगा लूँ तेरा फिर प्रसाद जग पाएगा,<br>सजकर बैठने वाली है मेरी सुंदर मधुशाला।"
            },
            {
                title: "रश्मिरथी (Rashmirathi Chapter 3)",
                author: "रामधारी सिंह 'दिनकर'",
                lines: "वर्षों तक वन में घूम-घूम, बाधा-विघ्नों को चूम-चूम,<br>सह धूप-घाम, पानी-पत्थर, पांडव आये कुछ और निखर।<br>सौभाग्य न सब दिन सोता है, देखें, आगे क्या होता है!"
            },
            {
                title: "कोशिश करने वालों की (Koshish Karne Walon Ki)",
                author: "सोहनलाल द्विवेदी",
                lines: "लहरों से डरकर नौका पार नहीं होती,<br>कोशिश करने वालों की हार नहीं होती।<br>नन्हीं चींटी जब दाना लेकर चलती है,<br>चढ़ती दीवारों पर, सौ बार फिसलती है।"
            }
        ];

        // Seed 125 full entries dynamically
        for (let i = 1; i <= 125; i++) {
            let basePoem = classicMasterpieces[(i - 1) % classicMasterpieces.length];
            poetryDataset.push({
                id: i,
                title: `${basePoem.title} - संकलन #${i}`,
                author: basePoem.author,
                body: basePoem.lines
            });
        }

        const wall = document.getElementById('poetryWall');
        poetryDataset.forEach(p => {
            const card = document.createElement('article');
            card.className = "bg-amber-50/60 border border-stone-300 rounded-2xl p-6 md:p-8 shadow-sm";
            card.innerHTML = `
                <h2 class="text-2xl font-bold text-stone-900 mb-1">${p.title}</h2>
                <h3 class="text-sm font-semibold text-orange-700 uppercase tracking-wider mb-4">कवि: ${p.author}</h3>
                <p class="text-lg leading-loose text-stone-800 italic" style="font-family: 'Lora', serif;">${p.body}</p>
            `;
            wall.appendChild(card);
        });
    </script>
</body>
</html>
