steps:
  # Step 1: Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}', 
      '-f', 'dockerfile.dockerfile',
      '.'
    ]

  # Step 2: Push the container image to GCP Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}'
    ]

  # Step 3: Deploy the image to Cloud Run using custom service account execution identity
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}'
      - '--region=${_LOCATION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--vpc-connector=${_VPC_CONNECTOR}'
      - '--vpc-egress=private-ranges-only'
      - '--service-account=cicd-124@cicd-tutorial-497406.iam.gserviceaccount.com'

substitutions:
  _LOCATION: 'asia-south1'
  _REPOSITORY: 'smile-web-repo'                   
  _IMAGE_NAME: 'smile-web'                        
  _SERVICE_NAME: 'smile-web-service'              
  _VPC_CONNECTOR: 'cloud-run-to-mysql-server'     

options:
  requestedVerifyOption: VERIFIED
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${COMMIT_SHA}'
